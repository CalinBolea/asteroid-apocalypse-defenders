services:
  asteroid-game:
    build: .
    restart: unless-stopped
    networks:
      - asteroid-net

  nginx:
    image: nginx:alpine
    ports:
      - "8099:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - asteroid-game
    restart: unless-stopped
    networks:
      - asteroid-net

networks:
  asteroid-net:
    name: asteroid-net
