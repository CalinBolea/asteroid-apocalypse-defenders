<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroid Apocalypse Defenders</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>ASTEROID APOCALYPSE</h1>
    <p class="subtitle">DEFENDERS</p>

    <div class="panel">
      <h2>Enter Your Name</h2>
      <input type="text" id="nameInput" placeholder="Player name" maxlength="16" autofocus>
    </div>

    <div class="panel">
      <h2>Create New Room</h2>
      <div class="mode-select">
        <label class="mode-option">
          <input type="radio" name="mode" value="belt-chaos" checked>
          <span>Belt Chaos</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode" value="planet-killer">
          <span>Planet Killer</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode" value="swarm-defense">
          <span>Swarm Defense</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode" value="typing-defense">
          <span>Typing Defense</span>
        </label>
      </div>
      <button id="createBtn">Create Room</button>
    </div>

    <div class="divider">- or -</div>

    <div class="panel">
      <h2>Join Existing Room</h2>
      <div class="join-row">
        <input type="text" id="codeInput" placeholder="CODE" maxlength="4">
        <button id="joinBtn">Join</button>
      </div>
    </div>

    <p class="error" id="errorMsg"></p>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
